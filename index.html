<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CODECUP - Dashboard do Torneio</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* UI E-sports Específica */
        .game-hub { background: rgba(0,0,0,0.2); padding: 1.5rem; border-radius: 0.5rem; margin-top: 1rem; border: 1px solid var(--border-color); }
        .podium-box { background: linear-gradient(145deg, #1e293b, #0f172a); padding: 2rem; border-radius: 0.5rem; border: 1px solid #c1ff00; text-align: center;}
        .podium-box select { background: #000; border: 1px solid #c1ff00; font-size: 1.1rem; color: #fff;}
        
        .groups-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; margin-top: 1rem; }
        .group-table { background: rgba(255,255,255,0.02); border-radius: 0.5rem; overflow: hidden; width: 100%; border-collapse: collapse;}
        .group-table th { background: rgba(255,255,255,0.05); color: #fff; text-align: center; padding: 10px;}
        .group-table td { text-align: center; padding: 10px; border-bottom: 1px solid var(--border-color);}
        .group-table tr:nth-child(1), .group-table tr:nth-child(2) { background: rgba(16, 185, 129, 0.1); border-left: 3px solid var(--primary); }
        
        .valorant-ladder { display: flex; flex-direction: column; gap: 1rem; max-width: 600px; margin: 0 auto; }
        .match-slot { border-left: 4px solid var(--border-color); padding-left: 1rem; position: relative; }
        .match-slot.active { border-left-color: var(--accent); }
        .match-slot.final { border-left-color: #fbbf24; }
        
        .badge { display: inline-block; padding: 0.2rem 0.5rem; border-radius: 0.25rem; font-size: 0.7rem; font-weight: bold; margin-bottom: 0.5rem; }
        .bg-blue { background: #3b82f6; color: #fff; }
        .bg-yellow { background: #fbbf24; color: #000; }
        .bg-red { background: #ef4444; color: #fff; }

        /* Painel de Horários */
        .time-config-panel { background: rgba(255,255,255,0.03); border: 1px solid var(--border-color); padding: 1.5rem; border-radius: 0.5rem; margin-bottom: 1.5rem; }
        .time-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; }
        .time-grid label { font-size: 0.8rem; color: var(--text-muted); display: block; margin-bottom: 3px; }
        .time-grid input, .time-grid select { padding: 8px; font-size: 0.9rem; margin-bottom: 10px;}
        .time-edit-btn { cursor: pointer; color: var(--accent); font-size: 0.85rem; transition: 0.2s; }
        .time-edit-btn:hover { color: #fff; text-decoration: underline; }
    </style>
</head>
<body>

    <!-- LOGIN -->
    <div id="login-section">
        <div class="login-box">
            <h1>CODECUP Admin</h1>
            <input type="email" id="email" placeholder="E-mail">
            <input type="password" id="password" placeholder="Senha">
            <button id="btn-login">Acessar Hub</button>
            <p id="login-error" style="color: var(--danger); text-align: center; margin-top: 1rem;"></p>
        </div>
    </div>

    <!-- PAINEL -->
    <div id="admin-section" class="hidden">
        <header>
            <h1>HUB DE TORNEIO <span>CODECUP</span></h1>
            <button id="btn-logout" class="btn-danger">Sair</button>
        </header>

        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('tab-cadastro')">1. Equipes</button>
            <button class="tab-btn" onclick="showTab('tab-torneio')">2. Gestão de Chaves e Duelos</button>
        </div>

        <!-- ABA 1: CRUD -->
        <div id="tab-cadastro" class="tab-content">
            <div class="grid-2">
                <div class="panel">
                    <h2>Registrar Nova Equipe</h2>
                    <input type="text" id="t-name" placeholder="Nome da Equipe">
                    <input type="text" id="t-class" placeholder="Sala / Turma">
                    <select id="t-game">
                        <option value="Brawl Stars">Brawl Stars</option>
                        <option value="Fortnite">Fortnite</option>
                        <option value="Free Fire">Free Fire</option>
                        <option value="Valorant">Valorant</option>
                    </select>
                    <textarea id="t-members" placeholder="Membros (vírgula)" rows="2"></textarea>
                    <button id="btn-save-team">Salvar Equipe</button>
                </div>
                <div class="panel">
                    <h2>Equipes Cadastradas</h2>
                    <div style="overflow-y: auto; max-height: 350px;">
                        <table><tbody id="lista-equipes-crud"></tbody></table>
                    </div>
                </div>
            </div>
        </div>

        <!-- ABA 2: HUB DE TORNEIO -->
        <div id="tab-torneio" class="tab-content hidden">
            <div class="panel" style="margin-bottom: 0; border-bottom-left-radius: 0; border-bottom-right-radius: 0;">
                <div style="display: flex; gap: 1rem; align-items: center;">
                    <h2 style="margin: 0;">Selecione a Modalidade:</h2>
                    <select id="hub-selector" style="width: 300px; margin: 0; font-size: 1.1rem; background: var(--accent); color: white; border: none;" onchange="loadGameHub()">
                        <option value="">-- Escolha --</option>
                        <option value="Free Fire">Free Fire (Battle Royale)</option>
                        <option value="Fortnite">Fortnite (Battle Royale)</option>
                        <option value="Brawl Stars">Brawl Stars (Grupos + Finais)</option>
                        <option value="Valorant">Valorant (Rei da Mesa)</option>
                    </select>
                </div>
            </div>

            <!-- CONTAINER DINÂMICO PARA CADA JOGO -->
            <div id="game-container" class="panel" style="border-top-left-radius: 0; border-top-right-radius: 0; min-height: 400px;">
                <p style="text-align: center; color: var(--text-muted); margin-top: 3rem;">Selecione uma modalidade acima para abrir o painel de controle.</p>
            </div>
        </div>

    </div>

    <!-- FIREBASE & LÓGICA CORE -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, where, doc, updateDoc, deleteDoc, getDocs, writeBatch, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD7flH7shnJj1v7hfOcSxLgbP2jgn8gaW8",
            authDomain: "codecup-7a34a.firebaseapp.com",
            projectId: "codecup-7a34a",
            storageBucket: "codecup-7a34a.firebasestorage.app",
            messagingSenderId: "231556704857",
            appId: "1:231556704857:web:eea9103792369163161f48"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let allTeams = [];
        let unsubscribeHub = null;

        // --- SISTEMA BASE ---
        window.showTab = function(tabId) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(tabId).classList.remove('hidden');
            event.currentTarget.classList.add('active');
        };

        document.getElementById('btn-login').addEventListener('click', async () => {
            try { await signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value); } 
            catch (e) { document.getElementById('login-error').innerText = "Erro: " + e.message; }
        });

        onAuthStateChanged(auth, user => {
            if (user) {
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('admin-section').classList.remove('hidden');
                loadTeamsGlobally();
            } else {
                document.getElementById('login-section').classList.remove('hidden');
                document.getElementById('admin-section').classList.add('hidden');
            }
        });
        document.getElementById('btn-logout').addEventListener('click', () => signOut(auth));

        document.getElementById('btn-save-team').addEventListener('click', async () => {
            const name = document.getElementById('t-name').value;
            const className = document.getElementById('t-class').value;
            const game = document.getElementById('t-game').value;
            if(!name || !className) return alert("Preencha Nome e Turma!");
            await addDoc(collection(db, "teams"), { name, class: className, game, members: document.getElementById('t-members').value, wins: 0 });
            document.getElementById('t-name').value = ''; document.getElementById('t-members').value = '';
        });

        function loadTeamsGlobally() {
            onSnapshot(collection(db, "teams"), snapshot => {
                allTeams = [];
                const lista = document.getElementById('lista-equipes-crud');
                lista.innerHTML = "";
                snapshot.forEach(docSnap => {
                    const t = { id: docSnap.id, ...docSnap.data() };
                    allTeams.push(t);
                    lista.innerHTML += `<tr><td><strong>${t.name}</strong><br><small>${t.class}</small></td><td>${t.game}</td><td><button class="btn-small-danger" onclick="window.excluirEquipe('${t.id}')">X</button></td></tr>`;
                });
                if(document.getElementById('hub-selector').value) window.loadGameHub();
            });
        }
        window.excluirEquipe = async id => { if(confirm("Excluir?")) await deleteDoc(doc(db, "teams", id)); };


        // ==========================================
        // MOTOR DE TEMPO (HELPER FUNCS)
        // ==========================================
        const strToMins = (str) => { const [h,m] = str.split(':'); return parseInt(h)*60 + parseInt(m); };
        const minsToStr = (mins) => { 
            const h = Math.floor(mins/60).toString().padStart(2, '0');
            const m = (mins%60).toString().padStart(2, '0');
            return `${h}:${m}`;
        };

        window.editMatchTime = async function(docId, collectionName) {
            const novoHorario = prompt("Digite o novo horário para esta partida (Ex: Dia 17 - 10:30):");
            if(novoHorario) {
                await updateDoc(doc(db, collectionName, docId), { timeStr: novoHorario });
            }
        };

        // UI Base de Configuração de Tempo a ser injetada
        const timeConfigHTML = `
            <div class="time-config-panel">
                <h4 style="margin-top: 0; color: var(--accent);">⚙️ Configuração de Agendamento</h4>
                <div class="time-grid">
                    <div><label>Dia Inicial</label><select id="cfg-dia"><option value="Dia 17">Dia 17</option><option value="Dia 18">Dia 18</option></select></div>
                    <div><label>Início da 1ª Partida</label><input type="time" id="cfg-inicio" value="08:00"></div>
                    <div><label>Duração/Partida (min)</label><input type="number" id="cfg-duracao" value="30"></div>
                    <div>
                        <label>Terá Intervalo?</label>
                        <select id="cfg-usa-int">
                            <option value="sim">Sim</option>
                            <option value="nao">Não</option>
                        </select>
                    </div>
                    <div><label>Início do Intervalo</label><input type="time" id="cfg-int-inicio" value="12:00"></div>
                    <div><label>Fim do Intervalo</label><input type="time" id="cfg-int-fim" value="13:00"></div>
                </div>
                <div style="border-top: 1px dashed var(--border-color); padding-top: 15px; margin-top: 5px; display: flex; align-items: center; gap: 15px;">
                    <div>
                        <label style="color: #fbbf24; font-weight: bold; font-size: 0.85rem;">Horário da Fase Final (Restrito p/ Dia 18)</label>
                        <input type="time" id="cfg-final-hora" value="10:00" style="background: #27272a; border-color: #fbbf24; margin-bottom:0;">
                    </div>
                    <p style="font-size: 0.8rem; color: gray; margin: 0; max-width: 400px;">A Grande Final (e Semifinais do Brawl Stars) serão fixadas automaticamente para o Dia 18 a partir deste horário.</p>
                </div>
            </div>
        `;


        // ==========================================
        // GERENCIADOR DE HUB
        // ==========================================
        window.loadGameHub = function() {
            if(unsubscribeHub) { unsubscribeHub(); unsubscribeHub = null; }
            const game = document.getElementById('hub-selector').value;
            const container = document.getElementById('game-container');
            if(!game) return container.innerHTML = "<p style='text-align:center;'>Selecione uma modalidade.</p>";

            const teams = allTeams.filter(t => t.game === game);

            if(game === "Free Fire" || game === "Fortnite") {
                renderBattleRoyaleUI(game, teams, container);
            } else if (game === "Brawl Stars") {
                renderBrawlStarsUI(teams, container);
            } else if (game === "Valorant") {
                renderValorantUI(teams, container);
            }
        };

        // ------------------------------------------
        // 1. MODALIDADE BATTLE ROYALE
        // ------------------------------------------
        async function renderBattleRoyaleUI(game, teams, container) {
            let options = '<option value="">-- Nenhuma Selecionada --</option>';
            teams.forEach(t => options += `<option value="${t.id}">${t.name} (${t.class})</option>`);

            container.innerHTML = `
                <div class="grid-2">
                    <div>
                        <h3 style="color: var(--primary);">Lobby - Inscritos (${teams.length})</h3>
                        <table class="group-table" style="width:100%; text-align:left;">
                            ${teams.map(t => `<tr><td style="padding: 10px; text-align:left;"><strong>${t.name}</strong> <small style="color:gray">${t.class}</small></td></tr>`).join('')}
                        </table>
                    </div>
                    <div class="podium-box">
                        <h3 style="color: #fbbf24; font-size: 1.8rem; margin-top:0;">COROAÇÃO</h3>
                        <p style="color:gray; font-size: 0.9rem; margin-bottom: 2rem;">Selecione manualmente as posições finais após o término das quedas.</p>
                        
                        <div style="margin-bottom: 1rem; text-align:left;">
                            <label style="color:#fbbf24; font-weight:bold;">🥇 1º Lugar (Campeão)</label>
                            <select id="br-pos1">${options}</select>
                        </div>
                        <div style="margin-bottom: 1rem; text-align:left;">
                            <label style="color:#94a3b8; font-weight:bold;">🥈 2º Lugar</label>
                            <select id="br-pos2">${options}</select>
                        </div>
                        <div style="margin-bottom: 1rem; text-align:left;">
                            <label style="color:#b45309; font-weight:bold;">🥉 3º Lugar</label>
                            <select id="br-pos3">${options}</select>
                        </div>
                        <button onclick="salvarPodioBR('${game}')" style="background: var(--primary); margin-top: 1rem;">Confirmar Resultado Oficial</button>
                    </div>
                </div>
            `;

            const docRef = await getDoc(doc(db, "podiums", game));
            if(docRef.exists()) {
                const data = docRef.data();
                document.getElementById('br-pos1').value = data.pos1 || '';
                document.getElementById('br-pos2').value = data.pos2 || '';
                document.getElementById('br-pos3').value = data.pos3 || '';
            }
        }
        window.salvarPodioBR = async (game) => {
            await setDoc(doc(db, "podiums", game), { pos1: document.getElementById('br-pos1').value, pos2: document.getElementById('br-pos2').value, pos3: document.getElementById('br-pos3').value });
            alert("Pódio salvo e sincronizado!");
        };

        // ------------------------------------------
        // 2. MODALIDADE BRAWL STARS
        // ------------------------------------------
        function renderBrawlStarsUI(teams, container) {
            container.innerHTML = `
                ${timeConfigHTML}
                <div style="display:flex; justify-content:space-between; align-items:center; border-bottom: 1px solid var(--border-color); padding-bottom: 1rem;">
                    <h3>Gestão de Grupos</h3>
                    <button onclick="gerarGruposBrawl()" style="width:auto; background:var(--accent);">Sortear e Criar Grupos</button>
                </div>
                <div id="bs-board">Aguardando sorteio...</div>
            `;

            const q = query(collection(db, "brawl_matches"), orderBy("match_id", "asc"));
            unsubscribeHub = onSnapshot(q, snapshot => {
                let matches = [];
                snapshot.forEach(d => matches.push({docId: d.id, ...d.data()}));
                if(matches.length === 0) return;

                let scores = {};
                teams.forEach(t => scores[t.id] = { name: t.name, class: t.class, wins: 0, group: t.group });
                
                let htmlGrupos = { A: '', B: '' };
                let htmlPartidas = { A: '', B: '', Semis: '', Final: '' };

                matches.forEach(m => {
                    if(m.winner_id && scores[m.winner_id]) scores[m.winner_id].wins++;

                    const isGroup = m.type === 'grupo';
                    const concluida = m.winner_id !== null;
                    const matchHtml = `
                        <div class="match-card" style="margin-bottom: 10px; padding: 10px;">
                            <div style="display:flex; justify-content:space-between; align-items:center; border-bottom: 1px solid var(--border-color); padding-bottom: 5px; margin-bottom: 10px;">
                                <span style="font-size:0.75rem; color:var(--text-muted); font-weight:bold;">${m.label || 'Partida'}</span>
                                <span class="time-edit-btn" onclick="editMatchTime('${m.docId}', 'brawl_matches')" title="Editar este horário">${m.timeStr || 'Sem horário'} ✏️</span>
                            </div>
                            <div class="team-row ${m.winner_id === m.t1_id ? 'winner' : ''}" style="margin-bottom:2px;">
                                <span>${m.t1_name}</span>
                                ${!concluida && m.t1_id ? `<button class="btn-win" onclick="setWinnerBrawl('${m.docId}', '${m.t1_id}')">Venceu</button>` : ''}
                            </div>
                            <div class="team-row ${m.winner_id === m.t2_id ? 'winner' : ''}">
                                <span>${m.t2_name}</span>
                                ${!concluida && m.t2_id ? `<button class="btn-win" onclick="setWinnerBrawl('${m.docId}', '${m.t2_id}')">Venceu</button>` : ''}
                            </div>
                        </div>
                    `;

                    if(isGroup) htmlPartidas[m.group] += matchHtml;
                    else if (m.type === 'semi') htmlPartidas.Semis += matchHtml;
                    else if (m.type === 'final') htmlPartidas.Final += matchHtml;
                });

                ['A', 'B'].forEach(g => {
                    let groupTeams = Object.values(scores).filter(t => t.group === g).sort((a,b) => b.wins - a.wins);
                    htmlGrupos[g] = groupTeams.map((t, idx) => `<tr><td style="color:var(--text-muted); font-size:0.8rem;">${idx+1}º</td><td><strong>${t.name}</strong></td><td style="color:var(--primary); font-weight:bold;">${t.wins}</td></tr>`).join('');
                });

                document.getElementById('bs-board').innerHTML = `
                    <div class="groups-layout">
                        <div>
                            <h4 style="text-align:center; background:#1e293b; margin:0; padding:10px; border-radius:5px 5px 0 0;">GRUPO A</h4>
                            <table class="group-table"><tr><th>#</th><th>Equipe</th><th>Vitórias</th></tr>${htmlGrupos.A}</table>
                            <h5 style="margin-top:1.5rem; color:var(--accent);">Confrontos do Grupo A</h5>
                            <div style="max-height: 400px; overflow-y:auto; padding-right:10px;">${htmlPartidas.A}</div>
                        </div>
                        <div>
                            <h4 style="text-align:center; background:#1e293b; margin:0; padding:10px; border-radius:5px 5px 0 0;">GRUPO B</h4>
                            <table class="group-table"><tr><th>#</th><th>Equipe</th><th>Vitórias</th></tr>${htmlGrupos.B}</table>
                            <h5 style="margin-top:1.5rem; color:var(--accent);">Confrontos do Grupo B</h5>
                            <div style="max-height: 400px; overflow-y:auto; padding-right:10px;">${htmlPartidas.B}</div>
                        </div>
                    </div>
                    
                    <div style="margin-top: 3rem; padding-top: 2rem; border-top: 2px dashed var(--border-color);">
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <h3 style="color: #fbbf24;">PLAYOFFS (Fase Final - Dia 18)</h3>
                            <button onclick="gerarPlayoffsBrawl()" style="width:auto; background:#fbbf24; color:black;">Gerar Chaves Finais</button>
                        </div>
                        <div class="groups-layout">
                            <div><h4 style="color:#94a3b8">Semifinais</h4>${htmlPartidas.Semis}</div>
                            <div><h4 style="color:#fbbf24">Grande Final</h4>${htmlPartidas.Final}</div>
                        </div>
                    </div>
                `;
            });
        }

        window.setWinnerBrawl = async (docId, winnerId) => await updateDoc(doc(db, "brawl_matches", docId), { winner_id: winnerId });

        window.gerarGruposBrawl = async () => {
            const teams = allTeams.filter(t => t.game === "Brawl Stars");
            if(teams.length !== 10) return alert("Brawl Stars precisa de exatamente 10 equipes!");
            if(!confirm("Isto apagará chaves existentes e sorteará novos grupos. Confirmar?")) return;

            // Configurações de tempo
            const dia = document.getElementById('cfg-dia').value;
            let tempoAtual = strToMins(document.getElementById('cfg-inicio').value);
            const duracao = parseInt(document.getElementById('cfg-duracao').value);
            const usaInt = document.getElementById('cfg-usa-int').value;
            const intInicio = strToMins(document.getElementById('cfg-int-inicio').value);
            const intFim = strToMins(document.getElementById('cfg-int-fim').value);

            teams.sort(() => Math.random() - 0.5);
            const batch = writeBatch(db);
            const oldMatches = await getDocs(collection(db, "brawl_matches"));
            oldMatches.forEach(d => batch.delete(d.ref));

            let gA = teams.slice(0, 5); let gB = teams.slice(5, 10);
            gA.forEach(t => batch.update(doc(db, "teams", t.id), { group: 'A' }));
            gB.forEach(t => batch.update(doc(db, "teams", t.id), { group: 'B' }));

            let matchesListA = []; let matchesListB = [];
            const buildList = (grp, label, list) => {
                for(let i=0; i<grp.length; i++) {
                    for(let j=i+1; j<grp.length; j++) {
                        list.push({ type: 'grupo', group: label, t1_id: grp[i].id, t1_name: grp[i].name, t2_id: grp[j].id, t2_name: grp[j].name, winner_id: null });
                    }
                }
            };
            buildList(gA, 'A', matchesListA); buildList(gB, 'B', matchesListB);

            // Intercala as partidas A e B e aplica horários
            let matchIdCounter = 1;
            for(let i=0; i < Math.max(matchesListA.length, matchesListB.length); i++) {
                const addMatch = (m) => {
                    if(!m) return;
                    if(usaInt === 'sim' && (tempoAtual + duracao) > intInicio && tempoAtual < intFim) tempoAtual = intFim;
                    
                    batch.set(doc(collection(db, "brawl_matches")), {
                        ...m, match_id: matchIdCounter++, timeStr: `${dia} - ${minsToStr(tempoAtual)}`
                    });
                    tempoAtual += duracao;
                };
                addMatch(matchesListA[i]);
                addMatch(matchesListB[i]);
            }

            await batch.commit();
        };

        window.gerarPlayoffsBrawl = async () => {
            const scores = {};
            const matches = await getDocs(query(collection(db, "brawl_matches"), where("type", "==", "grupo")));
            const teamsData = allTeams.filter(t => t.game === "Brawl Stars");
            teamsData.forEach(t => scores[t.id] = { id: t.id, name: t.name, group: t.group, wins: 0 });
            matches.forEach(m => { if(m.data().winner_id) scores[m.data().winner_id].wins++; });
            
            const gA = Object.values(scores).filter(t => t.group === 'A').sort((a,b) => b.wins - a.wins);
            const gB = Object.values(scores).filter(t => t.group === 'B').sort((a,b) => b.wins - a.wins);

            // Horários exclusivos para a Fase Final (Sempre Dia 18)
            const horaFinalStr = document.getElementById('cfg-final-hora').value;
            const duracao = parseInt(document.getElementById('cfg-duracao').value);
            const tSemi1 = strToMins(horaFinalStr);
            const tSemi2 = tSemi1 + duracao;
            const tGrandFinal = tSemi2 + duracao;

            const batch = writeBatch(db);
            batch.set(doc(collection(db, "brawl_matches"), "semi1"), {
                match_id: 100, type: 'semi', label: 'Semi 1 (1ºA vs 2ºB)', timeStr: `Dia 18 - ${minsToStr(tSemi1)}`,
                t1_id: gA[0].id, t1_name: gA[0].name, t2_id: gB[1].id, t2_name: gB[1].name, winner_id: null
            });
            batch.set(doc(collection(db, "brawl_matches"), "semi2"), {
                match_id: 101, type: 'semi', label: 'Semi 2 (1ºB vs 2ºA)', timeStr: `Dia 18 - ${minsToStr(tSemi2)}`,
                t1_id: gB[0].id, t1_name: gB[0].name, t2_id: gA[1].id, t2_name: gA[1].name, winner_id: null
            });
            batch.set(doc(collection(db, "brawl_matches"), "final"), {
                match_id: 102, type: 'final', label: '🏆 GRANDE FINAL', timeStr: `Dia 18 - ${minsToStr(tGrandFinal)}`,
                t1_id: null, t1_name: 'Vencedor Semi 1', t2_id: null, t2_name: 'Vencedor Semi 2', winner_id: null
            });
            await batch.commit();
        };

        onSnapshot(doc(db, "brawl_matches", "semi1"), doc => { if(doc.exists() && doc.data().winner_id) updateDoc(doc.ref.firestore.doc('brawl_matches/final'), { t1_id: doc.data().winner_id, t1_name: doc.data().winner_id === doc.data().t1_id ? doc.data().t1_name : doc.data().t2_name }); });
        onSnapshot(doc(db, "brawl_matches", "semi2"), doc => { if(doc.exists() && doc.data().winner_id) updateDoc(doc.ref.firestore.doc('brawl_matches/final'), { t2_id: doc.data().winner_id, t2_name: doc.data().winner_id === doc.data().t1_id ? doc.data().t1_name : doc.data().t2_name }); });

        // ------------------------------------------
        // 3. MODALIDADE VALORANT (REI DA MESA)
        // ------------------------------------------
        function renderValorantUI(teams, container) {
            container.innerHTML = `
                ${timeConfigHTML}
                <div style="text-align:center; margin-bottom: 2rem;">
                    <h3 style="color: #ef4444; font-size:1.5rem;">Formato: King of the Hill (Escada)</h3>
                    <button onclick="sortearValorant()" style="width: auto; padding: 10px 20px; background: #ef4444; color:white;">Iniciar Chaveamento (Sorteio Aleatório)</button>
                </div>
                <div id="val-board" class="valorant-ladder"></div>
            `;

            const q = query(collection(db, "val_matches"), orderBy("id", "asc"));
            unsubscribeHub = onSnapshot(q, snapshot => {
                const board = document.getElementById('val-board');
                board.innerHTML = "";
                snapshot.forEach(docSnap => {
                    const m = docSnap.data();
                    const concluida = m.winner_id !== null;
                    const destrancada = m.t1_id && m.t2_id;
                    
                    board.innerHTML += `
                        <div class="match-card match-slot ${destrancada ? 'active' : ''} ${m.id === 4 ? 'final' : ''}">
                            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 0.5rem; border-bottom: 1px solid var(--border-color); padding-bottom:5px;">
                                <div class="badge ${m.id === 4 ? 'bg-yellow' : 'bg-blue'}" style="margin:0;">${m.label}</div>
                                <span class="time-edit-btn" onclick="editMatchTime('${docSnap.id}', 'val_matches')" title="Editar este horário">${m.timeStr || 'Sem horário'} ✏️</span>
                            </div>
                            <div class="team-row ${m.winner_id === m.t1_id ? 'winner' : ''}">
                                <span style="${!m.t1_id ? 'color:gray; font-style:italic' : ''}">${m.t1_name}</span>
                                ${destrancada && !concluida ? `<button class="btn-win" onclick="processarVitoriaValorant('${docSnap.id}', 1, '${m.t1_id}', '${m.t1_name}', '${m.t2_id}', '${m.t2_name}')">Venceu</button>` : ''}
                            </div>
                            <div class="team-row ${m.winner_id === m.t2_id ? 'winner' : ''}">
                                <span style="${!m.t2_id ? 'color:gray; font-style:italic' : ''}">${m.t2_name}</span>
                                ${destrancada && !concluida ? `<button class="btn-win" onclick="processarVitoriaValorant('${docSnap.id}', 2, '${m.t2_id}', '${m.t2_name}', '${m.t1_id}', '${m.t1_name}')">Venceu</button>` : ''}
                            </div>
                        </div>
                    `;
                });
            });
        }

        window.sortearValorant = async () => {
            const teams = allTeams.filter(t => t.game === "Valorant");
            if(teams.length !== 3) return alert("Valorant requer exatamente 3 equipes para o Formato Escada!");
            if(!confirm("Isto reiniciará a escalada. Confirmar?")) return;

            // Configurações de Tempo
            const dia = document.getElementById('cfg-dia').value;
            let tempoAtual = strToMins(document.getElementById('cfg-inicio').value);
            const duracao = parseInt(document.getElementById('cfg-duracao').value);
            const usaInt = document.getElementById('cfg-usa-int').value;
            const intInicio = strToMins(document.getElementById('cfg-int-inicio').value);
            const intFim = strToMins(document.getElementById('cfg-int-fim').value);
            const horaFinalStr = document.getElementById('cfg-final-hora').value;

            // Helper para avançar tempo (Partidas Iniciais)
            const getNextTime = () => {
                if(usaInt === 'sim' && (tempoAtual + duracao) > intInicio && tempoAtual < intFim) tempoAtual = intFim;
                const r = `${dia} - ${minsToStr(tempoAtual)}`;
                tempoAtual += duracao;
                return r;
            };

            teams.sort(() => Math.random() - 0.5);
            const batch = writeBatch(db);
            
            batch.set(doc(db, "val_matches", "m1"), { id: 1, label: 'Partida 1', timeStr: getNextTime(), t1_id: teams[0].id, t1_name: teams[0].name, t2_id: teams[1].id, t2_name: teams[1].name, winner_id: null });
            batch.set(doc(db, "val_matches", "m2"), { id: 2, label: 'Partida 2 (Acesso Final)', timeStr: getNextTime(), t1_id: null, t1_name: 'Vencedor P1', t2_id: teams[2].id, t2_name: teams[2].name, winner_id: null });
            batch.set(doc(db, "val_matches", "m3"), { id: 3, label: 'Partida 3 (Repescagem Final)', timeStr: getNextTime(), t1_id: null, t1_name: 'Perdedor P1', t2_id: null, t2_name: 'Perdedor P2', winner_id: null });
            
            // Final é setada estritamente para o Dia 18 no horário definido
            batch.set(doc(db, "val_matches", "m4"), { id: 4, label: '🏆 GRANDE FINAL', timeStr: `Dia 18 - ${horaFinalStr}`, t1_id: null, t1_name: 'Vencedor P2', t2_id: null, t2_name: 'Vencedor P3', winner_id: null });

            await batch.commit();
        };

        window.processarVitoriaValorant = async (docId, btnPos, winId, winName, loseId, loseName) => {
            const batch = writeBatch(db);
            batch.update(doc(db, "val_matches", docId), { winner_id: winId }); 

            if(docId === "m1") {
                batch.update(doc(db, "val_matches", "m2"), { t1_id: winId, t1_name: winName });
                batch.update(doc(db, "val_matches", "m3"), { t1_id: loseId, t1_name: loseName });
            } else if(docId === "m2") {
                batch.update(doc(db, "val_matches", "m4"), { t1_id: winId, t1_name: winName });
                batch.update(doc(db, "val_matches", "m3"), { t2_id: loseId, t2_name: loseName });
            } else if(docId === "m3") {
                batch.update(doc(db, "val_matches", "m4"), { t2_id: winId, t2_name: winName });
            }

            await batch.commit();
        };

    </script>
</body>
